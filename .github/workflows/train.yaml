name: Training Pipeline

on:
  schedule:
    # Runs automatically at 00:00 UTC every Sunday
    - cron: "0 0 * * 0" 
  workflow_dispatch:
    # Allows you to manually trigger the pipeline from the GitHub UI for your screenshot

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Pipeline Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Pipeline (BTC)
        run: python src/orchestrator.py --symbol BTCUSDT

      - name: Execute Pipeline (ETH)
        run: python src/orchestrator.py --symbol ETHUSDT

      - name: Commit Champion Models and Artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated ML-Ops: Update Champion Models"
          file_pattern: "output/production_models/*.pkl"
          add_options: '--force'
          skip_dirty_check: false