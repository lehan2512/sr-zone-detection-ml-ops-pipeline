name: Training Pipeline

on:
  schedule:
    - cron: "0 0 * * 0" 
  workflow_dispatch:

jobs:
  train-champion:
    runs-on: self-hosted
    steps:
      - name: Azure Login via Managed Identity
        run: az login --identity

      - name: Trigger ACI Training (BTC)
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container create \
              --resource-group rg-sr-ops \
              --name sr-trainer-btc \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:latest \
              --registry-login-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --location eastasia \
              --os-type Linux \
              --subscription d35fd91a-6d8a-4d47-b194-93c8a3355137 \
              --environment-variables AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --command-line "python src/orchestrator.py --symbol BTCUSDT --mode train" \
              --cpu 2 \
              --memory 4 \
              --restart-policy Never

      - name: Trigger ACI Training (ETH)
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az container create \
              --resource-group rg-sr-ops \
              --name sr-trainer-eth \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:latest \
              --registry-login-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --location eastasia \
              --os-type Linux \
              --subscription d35fd91a-6d8a-4d47-b194-93c8a3355137 \
              --environment-variables AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --command-line "python src/orchestrator.py --symbol ETHUSDT --mode train" \
              --cpu 2 \
              --memory 4 \
              --restart-policy Never
