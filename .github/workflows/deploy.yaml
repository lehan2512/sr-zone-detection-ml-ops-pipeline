name: Deployment Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to ACR (Docker)
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Model Image
        run: |
          docker build --no-cache -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:${{ github.sha }} -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:prod .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:${{ github.sha }}
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:prod

      - name: Azure Login via Managed Identity
        run: az login --identity

      - name: Deploy to ACI
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            # No subscription secret needed here as the identity is already scoped
            az container create \
              --resource-group rg-sr-ops \
              --name sr-trainer-automated \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:${{ github.sha }} \
              --registry-login-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --location eastasia \
              --os-type Linux \
              --subscription d35fd91a-6d8a-4d47-b194-93c8a3355137 \
              --environment-variables AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --command-line "python src/orchestrator.py --symbol BTCUSDT --mode verify" \
              --cpu 1 \
              --memory 2 \
              --restart-policy OnFailure