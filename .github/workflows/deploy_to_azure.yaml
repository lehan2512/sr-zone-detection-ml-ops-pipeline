name: Automated MLOps Azure Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to ACR (Docker)
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push ML Image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:${{ github.sha }}

      - name: Deploy to ACI (Direct Auth)
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            # The --subscription flag is the "magic" that bypasses the 'az login' error
            az container create \
              --resource-group rg-sr-ops \
              --name sr-trainer-automated \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:${{ github.sha }} \
              --registry-login-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }} \
              --location westeurope \
              --cpu 2 \
              --memory 4 \
              --restart-policy OnFailure