name: Inference Pipeline

on:
  workflow_dispatch:
    inputs:
      symbol:
        description: 'Trading pair symbol (e.g., BTCUSDT, ETHUSDT)'
        required: true
        default: 'BTCUSDT'
        type: string

jobs:
  inference:
    runs-on: self-hosted
    steps:
      - name: Azure Login via Managed Identity
        run: az login --identity

      - name: Run Inference on ACI
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            # Convert symbol to lowercase for the container name
            SYMBOL_LOWER=$(echo "${{ github.event.inputs.symbol }}" | tr '[:upper:]' '[:lower:]')
            
            # Create/Run ACI
            az container create \
              --resource-group rg-sr-ops \
              --name sr-infer-${SYMBOL_LOWER} \
              --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/sr-ops:prod \
              --registry-login-server ${{ secrets.REGISTRY_LOGIN_SERVER }} \
              --registry-username ${{ secrets.REGISTRY_USERNAME }} \
              --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
              --location eastasia \
              --os-type Linux \
              --subscription d35fd91a-6d8a-4d47-b194-93c8a3355137 \
              --environment-variables AZURE_STORAGE_CONNECTION_STRING="${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" \
              --command-line "python src/orchestrator.py --symbol ${{ github.event.inputs.symbol }} --mode infer" \
              --cpu 2 \
              --memory 4 \
              --restart-policy Never

            # Wait for completion and show logs
            echo "Waiting for inference to complete..."
            sleep 30
            az container logs --resource-group rg-sr-ops --name sr-infer-${SYMBOL_LOWER}
