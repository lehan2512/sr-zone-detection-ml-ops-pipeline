# Data Processing Parameters
data:
  raw_path: "datasets/eth_dataset.csv"
  processed_path: "datasets/processed_data.csv"
  
features:
  rsi_period: 14
  atr_period: 14
  vol_ma_period: 20
  extrema_window: 20
  min_clusters: 2
  max_clusters: 8
  feature_list: 
    - "volume"
    - "rsi"
    - "atr"
    - "vol_ma"
    - "rsi_lag1"
    - "vol_ma_lag1"
    - "price_roc"

# Model Training Parameters
train:
  test_size: 0.2
  random_state: 42
  n_estimators: 200
  max_depth: 15
  min_samples_split: 5
  output_dir: "output/production_models"
  model_name: "sr_rf_model.pkl"
